services:

  # ── DynamoDB Local ────────────────────────────────────────────────────────
  dynamodb:
    image: amazon/dynamodb-local:2.5.2
    container_name: fl_dynamodb
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(1); s.connect(('localhost',8000)); s.close()\" 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ── LocalStack (S3 only) ──────────────────────────────────────────────────
  localstack:
    image: localstack/localstack:3.7.0
    container_name: fl_localstack
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      EAGER_SERVICE_LOADING: 1
      DEBUG: 0
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"s3\"' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ── Setup (creates tables + S3 bucket) ────────────────────────────────────
  setup:
    build:
      context: .
      dockerfile: Dockerfile.setup
    container_name: fl_setup
    depends_on:
      dynamodb:
        condition: service_healthy
      localstack:
        condition: service_healthy
    environment:
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      S3_ENDPOINT: http://localstack:4566
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    restart: "no"

  # ── Coordinator API ───────────────────────────────────────────────────────
  coordinator:
    build:
      context: .
      dockerfile: Dockerfile.coordinator
    container_name: fl_coordinator
    depends_on:
      setup:
        condition: service_completed_successfully
    environment:
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      S3_ENDPOINT: http://localstack:4566
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      EPOCH_TABLE: FederatedEpochTable
      SUBMISSION_TABLE: FederatedSubmissionTable
      AUDIT_TABLE: FederatedAuditTable
      ORG_TABLE: FederatedOrgTable
      BUCKET_NAME: fl-ingestion-bucket
      LOCAL_MODE: "true"
      PORT: "8080"
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./signing_key:/app/signing_key:ro

  # ── Aggregation worker (triggered by coordinator) ─────────────────────────
  aggregation:
    build:
      context: ./aggregation
      dockerfile: Dockerfile
    container_name: fl_aggregation
    environment:
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      S3_ENDPOINT: http://localstack:4566
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      EPOCH_TABLE: FederatedEpochTable
      SUBMISSION_TABLE: FederatedSubmissionTable
      AUDIT_TABLE: FederatedAuditTable
      BUCKET_NAME: fl-ingestion-bucket
    profiles: ["aggregation"]   # only started when coordinator triggers it
    restart: "no"

volumes:
  localstack_data:
